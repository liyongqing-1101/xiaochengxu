server:
  port: 8080
  servlet:
    context-path: /api
    # ============================================================
    # 【utf8mb4 强制】HTTP 请求响应编码
    # 防止 GET/POST 请求参数中文乱码
    # ============================================================
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

spring:
  # ============================================================
  # Spring MVC 全局编码配置（配合 JacksonConfig.java）
  # ============================================================
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  messages:
    encoding: UTF-8

  # ============================================================
  # 数据库连接配置（utf8mb4 编码）
  # ============================================================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://47.97.193.230:3306/mini_wx_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Liyong9!*
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 10000
      # 【utf8mb4 强制】连接初始化SQL，确保会话编码正确
      connection-init-sql: SET NAMES utf8mb4

  data:
    redis:
      host: 47.97.193.230
      port: 6379
      password: Liyong9!*
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
      timeout: 5000ms

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # ============================================================
  # Jackson JSON 序列化配置（配合 JacksonConfig.java）
  # ============================================================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ============================================================
# MyBatis 原生配置
# ============================================================
mybatis:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.wxjiaozi.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: false
    lazy-loading-enabled: false
    aggressive-lazy-loading: false
    default-statement-timeout: 3000
    default-fetch-size: 100
  # type-handlers 配置 JSON 处理器（MyBatis 原生支持）
  type-handlers-package: com.wxjiaozi.handler

  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://47.97.193.230:6379"
          password: "Liyong9!*"
          database: 0
          connectionPoolSize: 8
          connectionMinimumIdleSize: 2

app:
  jwt:
    secret: wxjiaozi-exam-secret-key-2024-mini-program-admin
    mini-expiration: 604800000
    admin-expiration: 7200000
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: wxjiaozi-exam
  import:
    batch-size: 1000
    temp-dir: /tmp/exam-import
    max-rows: 100000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
